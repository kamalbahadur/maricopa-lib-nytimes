spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            scope:
              - openid
              - profile
              - email

nytimes:
  redeem-url: ${NYTIMES_REDEEM_URL:https://www.nytimes.com/subscription/redeem/all-access}
  campaign-id: ${NYTIMES_CAMPAIGN_ID:87LH8}
  gift-code: ${NYTIMES_GIFT_CODE:1fd71a2edc5d2d0f}
  oauth2:
    registration-id: ${NYTIMES_OAUTH2_REGISTRATION_ID:google}
    principal-name: ${NYTIMES_OAUTH2_PRINCIPAL_NAME:replace-with-google-email}

